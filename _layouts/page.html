---
layout: default
---

<div class="content-block">
  <header class="content-header">
    <p class="eyebrow mb-1">Page</p>
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.description %}
      <p class="page-description">{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="content-body">
    {{ content }}
  </div>
</div>
